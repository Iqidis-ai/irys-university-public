<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en-US' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    {% seo %}
    {% if page.url contains '/articles/' %}
    <meta property="og:type" content="article">
    <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
    <meta property="article:modified_time" content="{{ page.last_modified_at | default: page.date | date_to_xmlschema }}">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": {{ page.title | jsonify }},
      "description": {{ page.description | jsonify }},
      "image": "{{ site.url }}{{ site.baseurl }}{{ page.image }}",
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
      "keywords": {{ page.keywords | jsonify }},
      "articleSection": "Legal AI",
      "author": {
        "@type": "Organization",
        "name": "Irys",
        "url": "https://www.irys.ai/"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Irys",
        "url": "https://www.irys.ai/",
        "logo": {
          "@type": "ImageObject",
          "url": "{{ site.url }}{{ site.baseurl }}{{ site.logo }}"
        },
        "sameAs": [
          "https://www.linkedin.com/company/irys-legal-ai"
        ]
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ site.url }}{{ site.baseurl }}{{ page.url }}"
      }
    }
    </script>
    {% else %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Irys",
      "url": "https://www.irys.ai/",
      "logo": "{{ site.url }}{{ site.baseurl }}{{ site.logo }}",
      "sameAs": [
        "https://www.linkedin.com/company/irys-legal-ai"
      ]
    }
    </script>
    {% endif %}
    <style>
      :root {
        color-scheme: light;
        --bg: #fbfbf8;
        --ink: #171717;
        --muted: #5b5f66;
        --rule: #deded6;
        --link: #135cc8;
        --max: 760px;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 18px/1.62 Georgia, "Times New Roman", serif;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 14px 20px;
        font: 14px/1.4 Arial, Helvetica, sans-serif;
        margin: 0 0 34px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--rule);
      }

      main {
        max-width: var(--max);
        margin: 0 auto;
        padding: 56px 22px 80px;
      }

      h1, h2, h3 {
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.14;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.5rem);
        margin: 0 0 28px;
      }

      h2 {
        font-size: 1.55rem;
        margin: 42px 0 14px;
      }

      p, ul, ol, blockquote {
        margin: 0 0 20px;
      }

      a {
        color: var(--link);
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 0 0 32px;
        border: 1px solid var(--rule);
      }

      blockquote {
        border-left: 3px solid var(--rule);
        color: var(--muted);
        padding-left: 18px;
      }

      code {
        font-family: Consolas, "Liberation Mono", monospace;
        font-size: 0.92em;
      }

      hr {
        border: 0;
        border-top: 1px solid var(--rule);
        margin: 40px 0;
      }

      footer {
        border-top: 1px solid var(--rule);
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        font: 14px/1.5 Arial, Helvetica, sans-serif;
        gap: 10px 18px;
        margin-top: 56px;
        padding-top: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <nav aria-label="Primary">
        <a href="{{ site.baseurl }}/">Irys University</a>
        <a href="{{ site.baseurl }}/articles/why-prompt-as-memory-fails.html">Matter Memory</a>
        <a href="{{ site.baseurl }}/articles/auditability-is-the-product.html">Auditability</a>
        <a href="{{ site.baseurl }}/articles/prompt-instructions-are-not-control.html">Controls</a>
        <a href="{{ site.baseurl }}/articles/legal-ai-exception-leak.html">Exception Leak</a>
        <a href="{{ site.baseurl }}/articles/citations-are-not-audit-trails.html">Audit Trails</a>
        <a href="{{ site.baseurl }}/articles/matter-memory-preserve-contradictions.html">Contradictions</a>
        <a href="{{ site.baseurl }}/articles/rerunning-is-not-repair.html">Repair</a>
        <a href="{{ site.baseurl }}/articles/how-to-train-gnns.html">GNN Training</a>
      </nav>
      {{ content }}
      <footer aria-label="Irys links">
        <span>Irys University</span>
        <a href="https://www.irys.ai/">Irys</a>
        <a href="https://www.linkedin.com/company/irys-legal-ai">LinkedIn</a>
      </footer>
    </main>
  </body>
</html>
